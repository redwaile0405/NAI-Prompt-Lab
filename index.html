<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NAI Prompt Lab (Enhanced Ed.)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>
    if (localStorage.getItem('dark-mode') === 'enabled') {
      document.documentElement.classList.add('dark');
    }
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    body { font-family: system-ui, sans-serif; transition: background-color 0.3s; }
    .tab-active { border-bottom: 4px solid #3b82f6; color: #1d4ed8; font-weight: 700; }
    .dark .tab-active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .img-container { position: relative; width: 100%; padding-top: 150%; overflow: hidden; border-radius: 12px; background: #f1f5f9; }
    .dark .img-container { background: #1e293b; }
    .img-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .card:hover { transform: translateY(-2px); transition: transform 0.2s; }
    .header-btn { padding: 0.6rem 1rem; border-radius: 0.75rem; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 0.4rem; color: white !important; }
    .dark .bg-white { background-color: #1e293b !important; color: #f1f5f9; }
    .dark .bg-slate-50 { background-color: #0f172a !important; }
    .dark .border { border-color: #334155 !important; }
    .dark input, .dark textarea, .dark select { background-color: #334155 !important; color: white !important; border-color: #475569 !important; }
    .tag-chip { cursor: pointer; transition: all 0.15s; border: 1px solid #e2e8f0; }
    .tag-chip.active { background-color: #3b82f6 !important; color: white !important; border-color: #2563eb; }
    .settings-sub-tab.active { background-color: #3b82f6; color: white; }
    .cat-badge { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; background: #e2e8f0; color: #475569; }
    .dark .cat-badge { background: #334155; color: #cbd5e1; }
    .file-input-label { cursor: pointer; display: block; background: #f8fafc; border: 2px dashed #e2e8f0; padding: 12px; border-radius: 12px; text-align: center; font-size: 11px; font-weight: bold; color: #64748b; }
    .dark .file-input-label { background: #1e293b; border-color: #334155; color: #94a3b8; }
    .slider-label { display: flex; justify-content: space-between; font-size: 10px; font-weight: 800; color: #94a3b8; margin-top: 4px; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .move-btn { opacity: 0; transition: opacity 0.2s; }
    .group:hover .move-btn, .card:hover .move-btn { opacity: 1; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen flex flex-col text-slate-900 dark:text-slate-100 font-sans">
<div class="flex flex-1 overflow-hidden">
  <aside class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col">
    <div class="p-6 border-b dark:border-slate-700 text-center flex justify-between items-center">
      <div class="text-left">
        <h1 class="text-xl font-black text-blue-600 dark:text-blue-400">NAI LAB</h1>
        <p class="text-[9px] font-bold text-slate-400 uppercase">Premium Version</p>
      </div>
      <button onclick="switchTab(5)" id="settingBtn" class="w-10 h-10 rounded-xl bg-slate-50 dark:bg-slate-700 flex items-center justify-center hover:bg-blue-500 hover:text-white transition-all">
        <i class="fa-solid fa-gear"></i>
      </button>
    </div>
    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
      <button onclick="switchTab(0)" id="tab0" class="tab-active w-full text-left px-4 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-3"><i class="fa-solid fa-user-tie"></i> 작가 정리</button>
      <button onclick="switchTab(1)" id="tab1" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-3"><i class="fa-solid fa-paintbrush"></i> 그림체 정리</button>
      <button onclick="switchTab(2)" id="tab2" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-3"><i class="fa-solid fa-tags"></i> 프롬프트 목록</button>
      <button onclick="switchTab(3)" id="tab3" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-3"><i class="fa-solid fa-flask-vial"></i> 연구 정리</button>
      <button onclick="switchTab(4)" id="tab4" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-3"><i class="fa-solid fa-shuffle"></i> 아티스트 믹서</button>

    </nav>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden">

      <div class="flex justify-between items-center">
        <h2 id="tabTitle" class="text-xl font-bold">작가 정리</h2>
        <div class="flex items-center gap-2">
          <button onclick="toggleBuilder()" class="header-btn bg-slate-600">빌더</button>
          <button id="mainAddBtn" onclick="addItem()" class="header-btn bg-red-500"><i class="fa-solid fa-plus"></i> 추가</button>

      </div>
      <div id="searchArea" class="relative">

        <input type="text" id="searchBar" oninput="renderList()" placeholder="검색어를 입력하세요..." class="w-full pl-11 pr-4 py-2 border rounded-xl dark:bg-slate-700 outline-none focus:ring-2 focus:ring-blue-500">

    <main class="flex-1 p-8 overflow-auto bg-slate-50 dark:bg-slate-900">

  </div>

  <aside id="builder-panel" class="w-80 bg-white dark:bg-slate-800 border-l dark:border-slate-700 flex flex-col hidden">

      <h3 class="font-bold text-sm uppercase tracking-wider">Prompt Builder</h3>

    <div class="flex-1 p-4 overflow-auto space-y-4">
      <div class="space-y-1">
        <label class="text-[10px] font-bold text-slate-400 uppercase">Positive</label>
        <textarea id="positive" class="w-full h-64 border rounded-lg p-3 font-mono text-xs leading-relaxed" placeholder="Positive Prompt..."></textarea>
      </div>
      <div class="space-y-1">
        <label class="text-[10px] font-bold text-slate-400 uppercase">Negative</label>
        <textarea id="negative" class="w-full h-32 border rounded-lg p-3 font-mono text-xs leading-relaxed" placeholder="Negative Prompt..."></textarea>
      </div>
    </div>
    <div class="p-4 border-t dark:border-slate-700 flex flex-col gap-2">
      <button onclick="copyPositive()" class="bg-blue-600 text-white py-3 rounded-lg font-bold shadow-lg">복사하기</button>
      <button onclick="clearBuilder()" class="text-[10px] text-slate-400 text-center underline">빌더 초기화</button>
    </div>
  </aside>
</div>

<div id="modalArtist" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50 p-4">

          <div><div class="flex justify-between items-center mb-1"><label class="font-black text-xs text-blue-500">COLOR</label><span id="vis_color" class="font-bold text-xs"></span></div><input id="a_color" type="range" min="1" max="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600" oninput="updateVisual()"><div class="slider-label"><span>PALE</span><span>VIVID</span></div></div>
        </div>
        <div class="space-y-6">
          <div><div class="flex justify-between items-center mb-1"><label class="font-black text-xs text-yellow-500">STABILITY</label><span id="vis_stab" class="font-bold text-xs text-yellow-500"></span></div><input id="a_stab" type="range" min="1" max="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-yellow-500" oninput="updateVisual()"><div class="slider-label"><span>LOW</span><span>HIGH</span></div></div>
          <div><div class="flex justify-between items-center mb-1"><label class="font-black text-xs text-yellow-500">CONSISTENCY</label><span id="vis_cons" class="font-bold text-xs text-yellow-500"></span></div><input id="a_cons" type="range" min="1" max="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-yellow-500" oninput="updateVisual()"><div class="slider-label"><span>LOW</span><span>HIGH</span></div></div>
        </div>

      <div class="grid grid-cols-3 gap-3 mb-6">
        <div><label class="file-input-label" for="a_img_file1">IMG 1 첨부</label><input type="file" id="a_img_file1" class="hidden" accept="image/*" onchange="handleImgUpload(event, 'a_img1')"><input type="hidden" id="a_img1"></div>

      </div>

      <div class="flex justify-end gap-3"><button onclick="closeModal()" class="px-6 py-2 border rounded-xl font-bold">취소</button><button onclick="saveArtist()" class="px-10 py-2 bg-blue-600 text-white rounded-xl font-bold shadow-lg">저장하기</button></div>
  </div>

      <div><label class="file-input-label" for="s_img_file2">IMG 2</label><input type="file" id="s_img_file2" class="hidden" onchange="handleImgUpload(event, 's_img2')"><input type="hidden" id="s_img1"></div>
      <div><label class="file-input-label" for="s_img_file3">IMG 3</label><input type="file" id="s_img_file3" class="hidden" onchange="handleImgUpload(event, 's_img3')"><input type="hidden" id="s_img1"></div>

<div id="modalResearch" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4">
  <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 max-w-2xl w-full shadow-2xl">
    <h3 class="text-xl font-black mb-4">실험/연구 결과 기록</h3>
    <div class="grid grid-cols-2 gap-4 mb-4"><input id="r_title" placeholder="실험 제목" class="border p-3 rounded-xl font-bold"><select id="r_category" class="border p-3 rounded-xl"></select></div>

    <div class="mb-6"><label class="file-input-label" for="r_img_file">결과 이미지 첨부</label><input type="file" id="r_img_file" class="hidden" onchange="handleImgUpload(event, 'r_image')"><input type="hidden" id="r_image"></div>
    <div class="flex justify-end gap-2"><button onclick="closeModal()" class="px-4 py-2 border rounded-xl font-bold">취소</button><button onclick="saveResearch()" class="bg-amber-600 text-white px-8 py-2 rounded-xl font-bold shadow-md">기록 저장</button></div>
  </div>

<script>
// --- 데이터 엔진 ---
const DB_NAME = "NAIPromptLabDB_V16";
const STORE_NAME = "labData";
let db, artists = [], styles = [], prompts = [], researches = [];
let artistCommonTags = ["실사", "반실사", "애니", "화려한", "깔끔한", "선명한"];

let promptCategories = [
    { name: "인물", subs: ["인원", "종족", "특징", "직업"] },
    { name: "외모", subs: ["얼굴", "눈", "입", "귀", "머리카락/색", "머리카락/모양"] },
    { name: "체형", subs: ["몸", "가슴", "팔", "손", "다리", "발", "날개", "꼬리", "기타 부위", "NSFW"] },
    { name: "의상", subs: ["의상", "상의", "하의", "속옷", "신발"] },
    { name: "장신구", subs: ["머리 장식", "얼굴 장식", "귀 장식", "목 장식", "손 장식", "기타", "NSFW"] },
    { name: "동작/몸", subs: ["몸", "얼굴", "머리", "목", "눈", "입", "귀", "코", "가슴", "엉덩이", "팔", "손", "다리", "발", "NSFW"] },
    { name: "동작/상호작용", subs: ["의상", "물건", "배경", "행위", "NSFW"] },
    { name: "테마", subs: ["기본"] },
    { name: "구도", subs: ["기본"] },
    { name: "효과", subs: ["기본"] }
];
let researchCategories = ["기본", "포즈", "색감", "소재"];

let currentTab = 0, currentSettingsSubTab = 'general', currentCategoryFilter = 'all', currentSubFilter = 'all', editId = null, builderVisible = false;

async function initDB() { return new Promise((resolve) => { const request = indexedDB.open(DB_NAME, 1); request.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME); request.onsuccess = e => { db = e.target.result; resolve(); }; }); }
async function saveToDB(key, data) { const tx = db.transaction(STORE_NAME, "readwrite"); tx.objectStore(STORE_NAME).put(JSON.parse(JSON.stringify(data)), key); }
async function getFromDB(key) { return new Promise((res) => { const tx = db.transaction(STORE_NAME, "readonly"); const req = tx.objectStore(STORE_NAME).get(key); req.onsuccess = () => res(req.result); }); }

async function syncAll() { 
  await saveToDB('artists', artists); await saveToDB('styles', styles); 
  await saveToDB('prompts', prompts); await saveToDB('researches', researches); 
  localStorage.setItem('artTags', JSON.stringify(artistCommonTags));
  localStorage.setItem('pCats_V2', JSON.stringify(promptCategories)); 
  localStorage.setItem('researchCats', JSON.stringify(researchCategories)); 
}

window.addEventListener('load', async () => { 
  await initDB(); 
  artists = await getFromDB('artists') || []; styles = await getFromDB('styles') || []; 
  prompts = await getFromDB('prompts') || []; researches = await getFromDB('researches') || []; 
  artistCommonTags = JSON.parse(localStorage.getItem('artTags') || '["실사", "반실사", "애니", "화려한", "깔끔한", "선명한"]');
  const savedPCats = localStorage.getItem('pCats_V2');
  if(savedPCats) promptCategories = JSON.parse(savedPCats);
  researchCategories = JSON.parse(localStorage.getItem('researchCats') || '["기본", "포즈", "색감", "소재"]'); 
  renderList(); 
});

function handleImgUpload(event, targetId) {
  const file = event.target.files[0]; if (!file) return;
  const label = event.target.previousElementSibling; label.textContent = "인코딩 중...";
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById(targetId).value = e.target.result;
    label.textContent = "첨부됨: " + file.name.substring(0, 10) + "...";
    label.classList.add('!border-blue-500', '!text-blue-500', '!bg-blue-50');
  };
  reader.readAsDataURL(file);
}

function switchTab(tab) { 
  currentTab = tab; currentCategoryFilter = 'all'; currentSubFilter = 'all';
  document.querySelectorAll('[id^="tab"]').forEach(el => el.classList.remove('tab-active')); 
  if(document.getElementById('tab' + tab)) document.getElementById('tab' + tab).classList.add('tab-active');
  document.getElementById('tabTitle').textContent = ["작가 정리", "그림체 정리", "프롬프트 목록", "연구 정리", "아티스트 믹서", "시스템 설정"][tab];
  document.getElementById('mainHeader').style.display = (tab === 5) ? 'none' : 'flex';
  renderList(); 
}

function renderSideCategories() {
  const sideList = document.getElementById('side-category-list');
  const area = document.getElementById('side-category-area');
  const title = document.getElementById('side-filter-title');
  sideList.innerHTML = '';
  let cats = [];

  if (currentTab === 0) { title.textContent = "작가 속성 필터"; cats = artistCommonTags; }
  else if (currentTab === 2) { title.textContent = "프롬프트 분류"; cats = promptCategories.map(c => c.name); }
  else if (currentTab === 3) { title.textContent = "연구 분류"; cats = researchCategories; }
  else { area.style.display = 'none'; return; }

  area.style.display = 'block';
  const createBtn = (label, value, isSub = false) => {
    const btn = document.createElement('button');
    btn.className = `w-full text-left px-4 py-2 rounded-xl text-[11px] font-bold transition-all ${isSub ? 'pl-8' : ''} ${((isSub ? currentSubFilter : currentCategoryFilter) === value) ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'}`;
    btn.textContent = label;
    btn.onclick = () => { 
        if(isSub) currentSubFilter = value;
        else { currentCategoryFilter = value; currentSubFilter = 'all'; }
        renderList(); 
    };
    sideList.appendChild(btn);
  };
  
  createBtn('전체보기', 'all');
  if (currentTab === 2 && currentCategoryFilter !== 'all') {
      const parent = promptCategories.find(c => c.name === currentCategoryFilter);
      if(parent) {
          createBtn(`← ${parent.name} (전체)`, parent.name);
          parent.subs.forEach(s => createBtn('• ' + s, s, true));
      }
  } else {
      cats.forEach(c => createBtn(c, c));
  }
}

// --- 순서 조정 기능 ---
async function moveItem(type, id, direction) {
    let list;
    if(type === 'artist') list = artists;
    else if(type === 'style') list = styles;
    else if(type === 'research') list = researches;
    else if(type === 'prompt') list = prompts;
    
    const index = list.findIndex(item => item.id === id);
    if(index === -1) return;
    const newIdx = index + direction;
    if(newIdx < 0 || newIdx >= list.length) return;
    [list[index], list[newIdx]] = [list[newIdx], list[index]];
    await syncAll(); renderList();
}

async function moveCat(type, index, direction) {
    let list = (type === 'prompt') ? promptCategories : researchCategories;
    const newIdx = index + direction;
    if(newIdx < 0 || newIdx >= list.length) return;
    [list[index], list[newIdx]] = [list[newIdx], list[index]];
    await syncAll(); renderSettingsDetail();
}

async function moveSubCat(pIdx, sIdx, direction) {
    const subs = promptCategories[pIdx].subs;
    const newIdx = sIdx + direction;
    if(newIdx < 0 || newIdx >= subs.length) return;
    [subs[sIdx], subs[newIdx]] = [subs[newIdx], subs[sIdx]];
    await syncAll(); renderSettingsDetail();
}

// --- 일괄 삭제 기능 ---
async function clearSpecificData(type) {
    if(!confirm(`${type}의 모든 데이터를 삭제하시겠습니까? 백업되지 않은 데이터는 복구할 수 없습니다.`)) return;
    if(type === 'artists') artists = [];
    else if(type === 'prompts') prompts = [];
    else if(type === 'styles') styles = [];
    else if(type === 'researches') researches = [];
    await syncAll();
    alert('삭제되었습니다.');
    renderSettingsDetail();
}

// --- 카테고리 로직 ---
function addArtTag() { const v = document.getElementById('new_art_tag').value.trim(); if(v && !artistCommonTags.includes(v)) { artistCommonTags.push(v); syncAll(); renderSettingsDetail(); } }
function delArtTag(t) { if(confirm('속성 삭제?')) { artistCommonTags = artistCommonTags.filter(x => x !== t); syncAll(); renderSettingsDetail(); } }
function addCat(type) { 
    const n = document.getElementById(type === 'prompt' ? 'new_pcat' : 'new_rcat').value.trim(); 
    if(n) { 
        if(type === 'prompt') promptCategories.push({name: n, subs: []}); 
        else researchCategories.push(n); 
        syncAll(); renderSettingsDetail(); 
    } 
}
function addSubCat(idx) {
    const v = document.getElementById(`new_sub_${idx}`).value.trim();
    if(v && !promptCategories[idx].subs.includes(v)) {
        promptCategories[idx].subs.push(v); syncAll(); renderSettingsDetail();
    }
}
function delSubCat(pIdx, sName) {
    if(!confirm(`'${sName}' 소분류를 삭제하시겠습니까? 소속된 프롬프트는 '미분류'로 이동합니다.`)) return;
    const pCatName = promptCategories[pIdx].name;
    prompts.forEach(p => {
        if(p.category === pCatName && p.subCategory === sName) p.subCategory = '';
    });
    promptCategories[pIdx].subs = promptCategories[pIdx].subs.filter(s => s !== sName);
    syncAll(); renderSettingsDetail();
}
function delCat(type, n) { 
    if(!confirm(`'${n}' 분류를 삭제하시겠습니까? 소속된 데이터는 '미분류'로 이동합니다.`)) return; 
    if(type === 'prompt') {
        prompts.forEach(p => { if(p.category === n) { p.category = ''; p.subCategory = ''; } });
        promptCategories = promptCategories.filter(c => c.name !== n); 
    } else {
        researches.forEach(r => { if(r.category === n) r.category = ''; });
        researchCategories = researchCategories.filter(c => c !== n); 
    }
    syncAll(); renderSettingsDetail(); 
}

// --- 프롬프트 모달 전용 ---
function updateSubCatSelect() {
    const mainVal = document.getElementById('p_main_cat').value;
    const subSelect = document.getElementById('p_sub_cat');
    const parent = promptCategories.find(c => c.name === mainVal);
    subSelect.innerHTML = '<option value="">소분류 선택 안함</option>' + (parent ? parent.subs.map(s => `<option value="${s}">${s}</option>`).join('') : '');
}

// --- CRUD ---
async function saveArtist() { const d = { id: editId || Date.now().toString(), name: document.getElementById('a_name').value, danbooru: document.getElementById('a_danbooru').value, tags: document.getElementById('a_tags').value, line: parseInt(document.getElementById('a_line').value), color: parseInt(document.getElementById('a_color').value), stab: parseInt(document.getElementById('a_stab').value), cons: parseInt(document.getElementById('a_cons').value), imgs: [document.getElementById('a_img1').value, document.getElementById('a_img2').value, document.getElementById('a_img3').value], notes: document.getElementById('a_notes').value }; if(editId) artists = artists.map(x => x.id === editId ? d : x); else artists.push(d); await syncAll(); closeModal(); renderList(); }
async function saveStyle() { const d = { id: editId || Date.now().toString(), title: document.getElementById('s_title').value, pos: document.getElementById('s_pos').value, imgs: [document.getElementById('s_img1').value, document.getElementById('s_img2').value, document.getElementById('s_img3').value] }; if(editId) styles = styles.map(x => x.id === editId ? d : x); else styles.push(d); await syncAll(); closeModal(); renderList(); }
async function savePrompt() { 
  const d = { 
    id: editId || Date.now().toString(), 
    word: document.getElementById('p_word').value, 
    desc: document.getElementById('p_desc').value, 
    category: document.getElementById('p_main_cat').value, 
    subCategory: document.getElementById('p_sub_cat').value, 
    image: document.getElementById('p_image').value 
  }; 
  if(editId) prompts = prompts.map(x => x.id === editId ? d : x);
  else prompts.push(d); 
  await syncAll(); closeModal(); renderList(); 
}
async function saveResearch() { const d = { id: editId || Date.now().toString(), title: document.getElementById('r_title').value, category: document.getElementById('r_category').value, prompt: document.getElementById('r_prompt').value, desc: document.getElementById('r_desc').value, image: document.getElementById('r_image').value }; if(editId) researches = researches.map(x => x.id === editId ? d : x); else researches.push(d); await syncAll(); closeModal(); renderList(); }

function edit(type, id) {
  editId = id;
  if(type === 'artist') {
    const item = artists.find(x => x.id === id);
    document.getElementById('modalArtist').classList.remove('hidden');
    document.getElementById('a_name').value = item.name; document.getElementById('a_danbooru').value = item.danbooru || '';
    document.getElementById('a_tags').value = item.tags || '';
    document.getElementById('a_line').value = item.line; document.getElementById('a_color').value = item.color;
    document.getElementById('a_stab').value = item.stab; document.getElementById('a_cons').value = item.cons;
    document.getElementById('a_img1').value = item.imgs[0]; document.getElementById('a_img2').value = item.imgs[1]; document.getElementById('a_img3').value = item.imgs[2];
    document.getElementById('a_notes').value = item.notes;
    refreshTagChips(); updateVisual();
  } else if(type === 'style') {
    const item = styles.find(x => x.id === id);
    document.getElementById('modalStyle').classList.remove('hidden');
    document.getElementById('s_title').value = item.title;
    document.getElementById('s_pos').value = item.pos;
    document.getElementById('s_img1').value = item.imgs[0]; document.getElementById('s_img2').value = item.imgs[1]; document.getElementById('s_img3').value = item.imgs[2];
  } else if(type === 'prompt') {
    const item = prompts.find(x => x.id === id);
    document.getElementById('modalPrompt').classList.remove('hidden');
    document.getElementById('p_word').value = item.word;
    document.getElementById('p_desc').value = item.desc || '';
    document.getElementById('p_main_cat').innerHTML = '<option value="">미분류</option>' + promptCategories.map(c => `<option value="${c.name}" ${c.name===item.category?'selected':''}>${c.name}</option>`).join('');
    updateSubCatSelect();
    document.getElementById('p_sub_cat').value = item.subCategory || '';
    document.getElementById('p_image').value = item.image || '';
    const label = document.querySelector('label[for="p_img_file"]');
    if(item.image) { label.textContent = "이미지 포함됨"; label.classList.add('!border-blue-500', '!text-blue-500'); }
  } else if(type === 'research') {
    const item = researches.find(x => x.id === id);
    document.getElementById('modalResearch').classList.remove('hidden');
    document.getElementById('r_title').value = item.title;
    document.getElementById('r_category').innerHTML = '<option value="">미분류</option>' + researchCategories.map(c => `<option value="${c}" ${c===item.category?'selected':''}>${c}</option>`).join('');
    document.getElementById('r_prompt').value = item.prompt;
    document.getElementById('r_desc').value = item.desc;
    document.getElementById('r_image').value = item.image;
  }
}

function del(type, id) { if(!confirm('정말 삭제하시겠습니까?')) return; if(type === 'artist') artists = artists.filter(x => x.id !== id); else if(type === 'style') styles = styles.filter(x => x.id !== id); else if(type === 'prompt') prompts = prompts.filter(x => x.id !== id); else if(type === 'research') researches = researches.filter(x => x.id !== id); syncAll(); renderList(); }

function addItem() {
  editId = null; const mods = [document.getElementById('modalArtist'), document.getElementById('modalStyle'), document.getElementById('modalPrompt'), document.getElementById('modalResearch')];
  const mod = mods[currentTab]; if(!mod) return;
  mod.querySelectorAll('input, textarea').forEach(i => i.value = '');
  mod.querySelectorAll('.file-input-label').forEach(l => { l.textContent = "컴퓨터 내 파일 첨부"; l.classList.remove('!border-blue-500', '!text-blue-500', '!bg-blue-50'); });
  if(currentTab === 2) {
      document.getElementById('p_main_cat').innerHTML = '<option value="">미분류</option>' + promptCategories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
      updateSubCatSelect();
  }
  if(currentTab === 3) document.getElementById('r_category').innerHTML = '<option value="">미분류</option>' + researchCategories.map(c => `<option value="${c}">${c}</option>`).join('');
  mod.classList.remove('hidden'); if(currentTab === 0) { refreshTagChips(); updateVisual(); }
}

function refreshTagChips() {
  const pool = document.getElementById('a_tag_pool'); if(!pool) return;
  const current = document.getElementById('a_tags').value.split(',').map(t => t.trim());
  pool.innerHTML = artistCommonTags.map(t => `<span onclick="toggleArtTagInEdit('${t}')" class="tag-chip text-[10px] px-3 py-1.5 rounded-full ${current.includes(t) ? 'active bg-blue-500 text-white shadow-sm' : 'bg-white dark:bg-slate-700 text-slate-500'} font-bold">${t}</span>`).join('');
}
function toggleArtTagInEdit(t) {
  const input = document.getElementById('a_tags');
  let current = input.value.split(',').map(x => x.trim()).filter(x => x);
  if(current.includes(t)) current = current.filter(x => x !== t); else current.push(t);
  input.value = current.join(', '); refreshTagChips();
}

function updateVisual() { ['line','color','stab','cons'].forEach(f => { const el = document.getElementById('vis_'+f); if(!el) return; const val = document.getElementById('a_'+f).value; el.textContent = (f === 'line' || f === 'color') ? getIndicator(val) : getIndicator(val, 'star'); }); }
function addToBuilder(type, id) { let item; if(type === 'artist') item = artists.find(x => x.id === id); else if(type === 'style') item = styles.find(x => x.id === id); else if(type === 'research') item = researches.find(x => x.id === id); if(!item) return; let p = (type === 'artist') ? `(1.2)::(${item.name})::` : (type === 'style' ? item.pos : item.prompt); document.getElementById('positive').value += (document.getElementById('positive').value ? ', ' : '') + p; }
function toggleDarkMode() { const isDark = document.documentElement.classList.toggle('dark'); localStorage.setItem('dark-mode', isDark ? 'enabled' : 'disabled'); }
function getIndicator(val, type) { const v = Number(val || 3); return type === 'star' ? '★'.repeat(v) + '☆'.repeat(5-v) : '■'.repeat(v) + '□'.repeat(5-v); }
function toggleBuilder() { builderVisible = !builderVisible; document.getElementById('builder-panel').classList.toggle('hidden', !builderVisible); }
function closeModal() { document.querySelectorAll('.fixed.inset-0').forEach(m => m.classList.add('hidden')); }
function copyPositive() { navigator.clipboard.writeText(document.getElementById('positive').value); alert('Positive Prompt 복사됨'); }
function clearBuilder() { if(confirm('빌더를 비우시겠습니까?')) { document.getElementById('positive').value = ''; document.getElementById('negative').value = ''; } }

// --- 데이터 백업 ---
async function exportData() { const d={artists,styles,prompts,researches,artistCommonTags,promptCategories,researchCategories}; const blob=new Blob([JSON.stringify(d, null, 2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`NAI_LAB_FULL_BACKUP.json`; a.click(); }
function exportSingle(type) { let d = {}; if(type==='artists') d={artists}; else if(type==='prompts') d={prompts,promptCategories}; else if(type==='styles') d={styles}; else if(type==='researches') d={researches,researchCategories}; const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`NAI_${type.toUpperCase()}.json`; a.click(); }
function importSingle(type) {
  const input=document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange=e=>{
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const d=JSON.parse(ev.target.result); let count=0;
        if(type==='artists' && d.artists) d.artists.forEach(x=>{if(!artists.find(y=>y.id===x.id)){artists.push(x);count++;}});
        else if(type==='prompts' && d.prompts) { d.prompts.forEach(x=>{if(!prompts.find(y=>y.id===x.id)){prompts.push(x);count++;}}); if(d.promptCategories) promptCategories = d.promptCategories; }
        else if(type==='styles' && d.styles) d.styles.forEach(x=>{if(!styles.find(y=>y.id===x.id)){styles.push(x);count++;}});
        else if(type==='researches' && d.researches) d.researches.forEach(x=>{if(!researches.find(y=>y.id===x.id)){researches.push(x);count++;}});
        await syncAll(); alert(count+'개 항목 병합 성공'); location.reload();
      }catch(e){alert('잘못된 파일 형식입니다.');}
    }; reader.readAsText(e.target.files[0]);
  }; input.click();
}

// --- 아티스트 믹서 ---
function renderMixer(cont) { cont.innerHTML = `<div class="max-w-4xl mx-auto space-y-8 fade-in"><div class="bg-white dark:bg-slate-800 rounded-[2.5rem] p-10 shadow-xl border dark:border-slate-700"><h3 class="text-3xl font-black text-center text-fuchsia-600 mb-8 uppercase tracking-widest">Artist Mixer</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8 text-xs"><div class="space-y-6"><p class="font-bold text-slate-400 uppercase">능력치 필터</p>${['line','color','stab','cons'].map(f => `<div class="flex items-center gap-4"><label class="w-12 font-black">${f.toUpperCase()}</label><input id="mix_min_${f}" type="number" min="1" max="5" value="1" class="w-10 border rounded text-center p-1"> ~ <input id="mix_max_${f}" type="number" min="1" max="5" value="5" class="w-10 border rounded text-center p-1"></div>`).join('')}</div><div class="space-y-4"><p class="font-bold text-slate-400 uppercase">속성 필터 (작가 태그)</p><input id="mix_tag_filter" placeholder="예: 실사" class="w-full border p-3 rounded-xl text-xs"><div class="grid grid-cols-2 gap-4 mt-2"><div><label class="opacity-50 block mb-1 font-bold">MIN WEIGHT</label><input id="mix_min" type="number" step="0.1" value="0.8" class="w-full border p-2 rounded-xl"></div><div><label class="opacity-50 block mb-1 font-bold">MAX WEIGHT</label><input id="mix_max" type="number" step="0.1" value="1.2" class="w-full border p-2 rounded-xl"></div></div></div></div><button onclick="generateMix()" class="w-full py-4 bg-fuchsia-600 text-white rounded-2xl font-black text-lg shadow-lg">랜덤 믹스 생성 🎲</button></div><div id="mix_results" class="grid grid-cols-1 gap-4"></div></div>`; }
function generateMix() {
  const tagFilter = document.getElementById('mix_tag_filter').value.trim().toLowerCase();
  const filtered = artists.filter(a => {
    const meetTag = !tagFilter || (a.tags && a.tags.toLowerCase().includes(tagFilter));
    const meetL = a.line >= parseInt(document.getElementById('mix_min_line').value) && a.line <= parseInt(document.getElementById('mix_max_line').value);
    const meetC = a.color >= parseInt(document.getElementById('mix_min_color').value) && a.color <= parseInt(document.getElementById('mix_max_color').value);
    const meetS = a.stab >= parseInt(document.getElementById('mix_min_stab').value) && a.stab <= parseInt(document.getElementById('mix_max_stab').value);
    const meetCo = a.cons >= parseInt(document.getElementById('mix_min_cons').value) && a.cons <= parseInt(document.getElementById('mix_max_cons').value);
    return meetTag && meetL && meetC && meetS && meetCo;
  });
  if(filtered.length === 0) return alert('조건을 만족하는 작가가 없습니다.');
  const min = parseFloat(document.getElementById('mix_min').value), max = parseFloat(document.getElementById('mix_max').value);
  const res = document.getElementById('mix_results'); res.innerHTML = '';
  for(let i=0; i<3; i++) {
    let mixArr = [];
    for(let j=0; j<3; j++) {
      const a = filtered[Math.floor(Math.random()*filtered.length)];
      const w = (Math.random()*(max-min)+min).toFixed(2);
      mixArr.push(`(${w})::(${a.name})::`);
    }
    const str = mixArr.join(' ');
    const div = document.createElement('div'); div.className = 'bg-white dark:bg-slate-800 p-6 rounded-2xl border dark:border-slate-700 cursor-pointer hover:border-fuchsia-500 shadow-sm transition-all';
    div.innerHTML = `<div class="font-mono text-xs break-all leading-relaxed">${str}</div><div class="mt-2 text-[9px] font-bold text-fuchsia-400">CLICK TO ADD BUILDER</div>`;
    div.onclick = () => { document.getElementById('positive').value += (document.getElementById('positive').value ? ', ' : '') + str; alert('믹스가 추가되었습니다.'); };
    res.appendChild(div);
  }
}
