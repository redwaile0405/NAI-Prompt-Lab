<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NAI Prompt Lab (Mixer Enhanced)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>
    if (localStorage.getItem('dark-mode') === 'enabled') {
      document.documentElement.classList.add('dark');
    }
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    body { font-family: system-ui, sans-serif; transition: background-color 0.3s; }
    .tab-active { border-bottom: 4px solid #3b82f6; color: #1d4ed8; font-weight: 700; }
    .dark .tab-active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .img-container { position: relative; width: 100%; padding-top: 150%; overflow: hidden; border-radius: 12px; background: #f1f5f9; }
    .dark .img-container { background: #1e293b; }
    .img-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .card:hover { transform: translateY(-2px); transition: transform 0.2s; }
    .header-btn { padding: 0.6rem 1rem; border-radius: 0.75rem; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 0.4rem; color: white !important; }
    .dark .bg-white { background-color: #1e293b !important; color: #f1f5f9; }
    .dark .bg-slate-50 { background-color: #0f172a !important; }
    .dark .border { border-color: #334155 !important; }
    .dark input, .dark textarea, .dark select { background-color: #334155 !important; color: white !important; border-color: #475569 !important; }
    .tag-chip { cursor: pointer; transition: all 0.15s; border: 1px solid #e2e8f0; }
    .tag-chip.active { background-color: #3b82f6 !important; color: white !important; border-color: #2563eb; }
    .settings-sub-tab.active { background-color: #3b82f6; color: white; }
    .cat-badge { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; background: #e2e8f0; color: #475569; }
    .dark .cat-badge { background: #334155; color: #cbd5e1; }
    .file-input-label { cursor: pointer; display: block; background: #f8fafc; border: 2px dashed #e2e8f0; padding: 12px; border-radius: 12px; text-align: center; font-size: 11px; font-weight: bold; color: #64748b; }
    .dark .file-input-label { background: #1e293b; border-color: #334155; color: #94a3b8; }
    .slider-label { display: flex; justify-content: space-between; font-size: 10px; font-weight: 800; color: #94a3b8; margin-top: 4px; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .move-btn { opacity: 0; transition: opacity 0.2s; }
    .group:hover .move-btn, .card:hover .move-btn { opacity: 1; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen flex flex-col text-slate-900 dark:text-slate-100 font-sans">

  <aside class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col">

    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">

      <button onclick="switchTab(1)" id="tab1" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-3"><i class="fa-solid fa-paintbrush"></i> 그림체 정리</button>
      <button onclick="switchTab(2)" id="tab2" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-3"><i class="fa-solid fa-tags"></i> 프롬프트 목록</button>

<script>
// --- 데이터 엔진 ---
const DB_NAME = "NAIPromptLabDB_V16";
const STORE_NAME = "labData";
let db, artists = [], styles = [], prompts = [], researches = [];
let artistCommonTags = ["실사", "반실사", "애니", "화려한", "깔끔한", "선명한"];
let promptCategories = [{ name: "인물", subs: ["인원", "종족", "특징", "직업"] }];
let researchCategories = ["기본", "포즈", "색감", "소재"];

// 믹서용 임시 데이터
let mixerSelectedArtists = [];

let currentTab = 0, currentSettingsSubTab = 'general', currentCategoryFilter = 'all', currentSubFilter = 'all', editId = null, builderVisible = false;

async function initDB() { return new Promise((resolve) => { const request = indexedDB.open(DB_NAME, 1); request.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME); request.onsuccess = e => { db = e.target.result; resolve(); }; }); }
async function saveToDB(key, data) { const tx = db.transaction(STORE_NAME, "readwrite"); tx.objectStore(STORE_NAME).put(JSON.parse(JSON.stringify(data)), key); }
async function getFromDB(key) { return new Promise((res) => { const tx = db.transaction(STORE_NAME, "readonly"); const req = tx.objectStore(STORE_NAME).get(key); req.onsuccess = () => res(req.result); }); }

async function syncAll() { 
  await saveToDB('artists', artists); await saveToDB('styles', styles); 
  await saveToDB('prompts', prompts); await saveToDB('researches', researches); 
  localStorage.setItem('artTags', JSON.stringify(artistCommonTags));
  localStorage.setItem('pCats_V2', JSON.stringify(promptCategories)); 
  localStorage.setItem('researchCats', JSON.stringify(researchCategories)); 
}

window.addEventListener('load', async () => { 
  await initDB(); 
  artists = await getFromDB('artists') || []; styles = await getFromDB('styles') || []; 
  prompts = await getFromDB('prompts') || []; researches = await getFromDB('researches') || []; 
  artistCommonTags = JSON.parse(localStorage.getItem('artTags') || '["실사", "반실사", "애니", "화려한", "깔끔한", "선명한"]');
  const savedPCats = localStorage.getItem('pCats_V2');
  if(savedPCats) promptCategories = JSON.parse(savedPCats);
  researchCategories = JSON.parse(localStorage.getItem('researchCats') || '["기본", "포즈", "색감", "소재"]'); 
  renderList(); 
});

function handleImgUpload(event, targetId) {
  const file = event.target.files[0]; if (!file) return;
  const label = event.target.previousElementSibling; label.textContent = "인코딩 중...";
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById(targetId).value = e.target.result;
    label.textContent = "첨부됨: " + file.name.substring(0, 10) + "...";
    label.classList.add('!border-blue-500', '!text-blue-500', '!bg-blue-50');
  };
  reader.readAsDataURL(file);
}

function switchTab(tab) { 
  currentTab = tab; currentCategoryFilter = 'all'; currentSubFilter = 'all';
  document.querySelectorAll('[id^="tab"]').forEach(el => el.classList.remove('tab-active')); 
  if(document.getElementById('tab' + tab)) document.getElementById('tab' + tab).classList.add('tab-active');
  document.getElementById('tabTitle').textContent = ["작가 정리", "그림체 정리", "프롬프트 목록", "연구 정리", "아티스트 믹서", "시스템 설정"][tab];
  document.getElementById('mainHeader').style.display = (tab === 5) ? 'none' : 'flex';
  const dmBtn = document.getElementById('dataManageBtn');
  if (tab === 2 || tab === 3) dmBtn.classList.remove('hidden'); else dmBtn.classList.add('hidden');
  renderList(); 
}

function renderSideCategories() {
  const area = document.getElementById('side-category-area');
  const sideList = document.getElementById('side-category-list');
  const title = document.getElementById('side-filter-title');
  sideList.innerHTML = '';
  let cats = [];
  if (currentTab === 0) { title.textContent = "작가 속성 필터"; cats = artistCommonTags; }
  else if (currentTab === 2) { title.textContent = "프롬프트 분류"; cats = promptCategories.map(c => c.name); }
  else if (currentTab === 3) { title.textContent = "연구 분류"; cats = researchCategories; }
  else { area.style.display = 'none'; return; }
  area.style.display = 'block';
  const createBtn = (label, value, isSub = false) => {
    const btn = document.createElement('button');
    btn.className = `w-full text-left px-4 py-2 rounded-xl text-[11px] font-bold transition-all ${isSub ? 'pl-8' : ''} ${((isSub ? currentSubFilter : currentCategoryFilter) === value) ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'}`;
    btn.textContent = label;
    btn.onclick = () => { if(isSub) currentSubFilter = value; else { currentCategoryFilter = value; currentSubFilter = 'all'; } renderList(); };
    sideList.appendChild(btn);
  };
  createBtn('전체보기', 'all');
  if (currentTab === 2 && currentCategoryFilter !== 'all') {
      const parent = promptCategories.find(c => c.name === currentCategoryFilter);
      if(parent) { createBtn(`← ${parent.name} (전체)`, parent.name); parent.subs.forEach(s => createBtn('• ' + s, s, true)); }

function generateEnhancedMix() {
    if (mixerSelectedArtists.length === 0) return alert('먼저 작가를 추가해 주세요.');
    const count = parseInt(document.getElementById('mix_count').value);
    const minW = parseFloat(document.getElementById('mix_min_w').value);
    const maxW = parseFloat(document.getElementById('mix_max_w').value);
    const precision = parseInt(document.getElementById('mix_precision').value);

    const resArea = document.getElementById('mix_results');
    resArea.innerHTML = '';

    for (let i = 0; i < 3; i++) {
        // 무작위 셔플 후 지정된 수만큼 선택
        let shuffled = [...mixerSelectedArtists].sort(() => 0.5 - Math.random());
        let selected = shuffled.slice(0, count);
        
        // 가중치 부여 및 정렬
        let mixedResults = selected.map(a => {
            const weight = (Math.random() * (maxW - minW) + minW).toFixed(precision);
            return { name: a.name, weight: parseFloat(weight) };
        });

        // 가중치 내림차순 정렬
        mixedResults.sort((a, b) => b.weight - a.weight);

        const resultString = mixedResults.map(r => `(${r.weight})::(${r.name})::`).join(', ');
        
        const div = document.createElement('div');
        div.className = 'bg-white dark:bg-slate-800 p-8 rounded-[2rem] border dark:border-slate-700 cursor-pointer hover:border-fuchsia-500 shadow-sm transition-all group';
        div.innerHTML = `
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-black text-fuchsia-500 uppercase tracking-widest">Generated Mix #${i+1}</span>
                <span class="text-[10px] text-slate-400 group-hover:text-fuchsia-400 font-bold">Click to build</span>
            </div>
            <div class="font-mono text-sm break-all leading-relaxed font-bold">${resultString}</div>
        `;
        div.onclick = () => {
            document.getElementById('positive').value += (document.getElementById('positive').value ? ', ' : '') + resultString;
            alert('빌더에 추가되었습니다.');
        };
        resArea.appendChild(div);
    }
}

async function exportByFilter() {
    const mainCat = document.getElementById('dm_main_cat').value;

    if (currentTab === 2) {

            const mMatch = mainCat === 'all' || (mainCat === 'unclassified' ? !p.category : p.category === mainCat);
            const sMatch = subCat === 'all' || p.subCategory === subCat;
            return mMatch && sMatch;
        });

    } else {
        targetData = researches.filter(r => mainCat === 'all' || (mainCat === 'unclassified' ? !r.category : r.category === mainCat));

    }
    if (targetData.length === 0) return alert('데이터가 없습니다.');

    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fileName; a.click();

async function deleteByFilter() {

    }

// --- 전체 백업 가져오기 ---
function importFullBackup() {
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
    input.onchange = e => {
        const reader = new FileReader();
        reader.onload = async ev => {
            try {
                const d = JSON.parse(ev.target.result);
                if (!confirm("데이터를 병합하시겠습니까?")) return;
                if (d.artists) d.artists.forEach(item => { if(!artists.find(a => a.id === item.id)) artists.push(item); });
                if (d.styles) d.styles.forEach(item => { if(!styles.find(s => s.id === item.id)) styles.push(item); });
                if (d.prompts) {
                    if (d.promptCategories) {
                        d.promptCategories.forEach(extCat => {
                            let locCat = promptCategories.find(c => c.name === extCat.name);
                            if (!locCat) promptCategories.push(extCat);
                            else extCat.subs.forEach(s => { if(!locCat.subs.includes(s)) locCat.subs.push(s); });
                        });
                    }
                    d.prompts.forEach(item => { if(!prompts.find(p => p.id === item.id)) prompts.push(item); });
                }
                if (d.researches) {
                    if (d.researchCategories) d.researchCategories.forEach(rc => { if(!researchCategories.includes(rc)) researchCategories.push(rc); });
                    d.researches.forEach(item => { if(!researches.find(r => r.id === item.id)) researches.push(item); });
                }
                await syncAll(); alert('병합 완료'); location.reload();
            } catch (err) { alert('파일 오류'); }
        }; reader.readAsText(e.target.files[0]);
    }; input.click();
}

async function moveItem(type, id, direction) {
    let list = (type === 'artist') ? artists : (type === 'style' ? styles : (type === 'research' ? researches : prompts));
    const idx = list.findIndex(item => item.id === id);
    if(idx === -1) return; const nIdx = idx + direction;
    if(nIdx < 0 || nIdx >= list.length) return;
    [list[idx], list[nIdx]] = [list[nIdx], list[idx]];
    await syncAll(); renderList();
}

function del(type, id) { if(confirm('삭제하시겠습니까?')) { if(type === 'artist') artists = artists.filter(x => x.id !== id); else if(type === 'style') styles = styles.filter(x => x.id !== id); else if(type === 'prompt') prompts = prompts.filter(x => x.id !== id); else if(type === 'research') researches = researches.filter(x => x.id !== id); syncAll(); renderList(); } }
function addItem() {
  editId = null; const mods = [document.getElementById('modalArtist'), document.getElementById('modalStyle'), document.getElementById('modalPrompt'), document.getElementById('modalResearch')];
  const mod = mods[currentTab]; if(!mod) return;
  mod.querySelectorAll('input, textarea').forEach(i => i.value = '');
  if(currentTab === 2) { document.getElementById('p_main_cat').innerHTML = '<option value="">미분류</option>' + promptCategories.map(c => `<option value="${c.name}">${c.name}</option>`).join(''); updateSubCatSelect(); }
  if(currentTab === 3) document.getElementById('r_category').innerHTML = '<option value="">미분류</option>' + researchCategories.map(c => `<option value="${c}">${c}</option>`).join('');
  mod.classList.remove('hidden'); if(currentTab === 0) { refreshTagChips(); updateVisual(); }
}
function updateSubCatSelect() { const mainVal = document.getElementById('p_main_cat').value; const subSelect = document.getElementById('p_sub_cat'); const parent = promptCategories.find(c => c.name === mainVal); subSelect.innerHTML = '<option value="">소분류 선택 안함</option>' + (parent ? parent.subs.map(s => `<option value="${s}">${s}</option>`).join('') : ''); }
function refreshTagChips() { const pool = document.getElementById('a_tag_pool'); if(!pool) return; const current = document.getElementById('a_tags').value.split(',').map(t => t.trim()); pool.innerHTML = artistCommonTags.map(t => `<span onclick="toggleArtTagInEdit('${t}')" class="tag-chip text-[10px] px-3 py-1.5 rounded-full ${current.includes(t) ? 'active bg-blue-500 text-white shadow-sm' : 'bg-white dark:bg-slate-700 text-slate-500'} font-bold">${t}</span>`).join(''); }
function toggleArtTagInEdit(t) { const input = document.getElementById('a_tags'); let current = input.value.split(',').map(x => x.trim()).filter(x => x); if(current.includes(t)) current = current.filter(x => x !== t); else current.push(t); input.value = current.join(', '); refreshTagChips(); }
function updateVisual() { ['line','color','stab','cons'].forEach(f => { const el = document.getElementById('vis_'+f); if(!el) return; const val = document.getElementById('a_'+f).value; el.textContent = (f === 'line' || f === 'color') ? getIndicator(val) : getIndicator(val, 'star'); }); }
function getIndicator(val, type) { const v = Number(val || 3); return type === 'star' ? '★'.repeat(v) + '☆'.repeat(5-v) : '■'.repeat(v) + '□'.repeat(5-v); }
function toggleBuilder() { builderVisible = !builderVisible; document.getElementById('builder-panel').classList.toggle('hidden', !builderVisible); }
function closeModal() { document.querySelectorAll('.fixed.inset-0').forEach(m => m.classList.add('hidden')); }
function copyPositive() { navigator.clipboard.writeText(document.getElementById('positive').value); alert('복사되었습니다.'); }
function clearBuilder() { if(confirm('초기화하시겠습니까?')) document.getElementById('positive').value = ''; }
function addToBuilder(type, id) { let item; if(type === 'artist') item = artists.find(x => x.id === id); else if(type === 'style') item = styles.find(x => x.id === id); else if(type === 'research') item = researches.find(x => x.id === id); if(!item) return; let p = (type === 'artist') ? `(1.2)::(${item.name})::` : (type === 'style' ? item.pos : item.prompt); document.getElementById('positive').value += (document.getElementById('positive').value ? ', ' : '') + p; }
function toggleDarkMode() { const isDark = document.documentElement.classList.toggle('dark'); localStorage.setItem('dark-mode', isDark ? 'enabled' : 'disabled'); }

// --- 설정 탭 렌더링 ---
function renderSettings(cont) {
  cont.innerHTML = `<div class="bg-white dark:bg-slate-800 rounded-[2.5rem] shadow-xl border dark:border-slate-700 flex min-h-[600px] overflow-hidden fade-in"><div class="w-64 bg-slate-50 dark:bg-slate-900/50 border-r dark:border-slate-700 p-6 space-y-2"><button onclick="switchSettingsSubTab('general')" class="settings-sub-tab ${currentSettingsSubTab==='general'?'active':''} w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-2"><i class="fa-solid fa-sliders"></i> 일반 설정</button><button onclick="switchSettingsSubTab('tags_artist')" class="settings-sub-tab ${currentSettingsSubTab==='tags_artist'?'active':''} w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-2"><i class="fa-solid fa-user-gear"></i> 작가 속성</button><button onclick="switchSettingsSubTab('tags_prompt')" class="settings-sub-tab ${currentSettingsSubTab==='tags_prompt'?'active':''} w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-2"><i class="fa-solid fa-layer-group"></i> 프롬프트 분류</button><button onclick="switchSettingsSubTab('tags_research')" class="settings-sub-tab ${currentSettingsSubTab==='tags_research'?'active':''} w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-2"><i class="fa-solid fa-flask"></i> 연구 분류</button><button onclick="switchSettingsSubTab('import_export')" class="settings-sub-tab ${currentSettingsSubTab==='import_export'?'active':''} w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-2"><i class="fa-solid fa-file-export"></i> 데이터 관리</button></div><div id="settings-detail" class="flex-1 p-12 overflow-y-auto"></div></div>`;
  renderSettingsDetail();
}
function switchSettingsSubTab(sub) { currentSettingsSubTab = sub; renderSettings(document.getElementById('content')); }
function renderSettingsDetail() {
  const detail = document.getElementById('settings-detail');
  if (currentSettingsSubTab === 'general') { detail.innerHTML = `<h3 class="text-2xl font-black mb-8">일반 설정</h3><button onclick="toggleDarkMode()" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg">다크모드 전환</button>`; }
  else if (currentSettingsSubTab === 'import_export') {
    detail.innerHTML = `<h3 class="text-2xl font-black mb-4">데이터 관리</h3><p class="text-sm text-blue-500 mb-8 font-bold">전체 백업 및 개별 관리가 가능합니다.</p><div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">${['artists','prompts','styles','researches'].map(type => `<div class="p-6 border dark:border-slate-700 rounded-3xl bg-slate-50/50 dark:bg-slate-900/50 flex flex-col gap-4"><p class="font-black uppercase text-slate-500">${type}</p><div class="flex gap-2"><button onclick="exportSingle('${type}')" class="flex-1 bg-slate-800 text-white px-3 py-2 rounded-xl text-xs font-bold">내보내기</button><button onclick="importSingle('${type}')" class="flex-1 bg-blue-600 text-white px-3 py-2 rounded-xl text-xs font-bold">가져오기</button></div></div>`).join('')}</div><div class="border-t pt-8"><button onclick="exportData()" class="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-black text-lg shadow-xl mb-3">전체 백업 생성</button><button onclick="importFullBackup()" class="w-full py-5 bg-blue-700 text-white rounded-[2rem] font-black text-lg shadow-xl">전체 백업 파일 가져오기</button></div>`;
  } else { detail.innerHTML = `<p class="text-slate-400">분류 관리 기능을 준비 중입니다.</p>`; }
}
async function exportData() { const d={artists,styles,prompts,researches,artistCommonTags,promptCategories,researchCategories}; const blob=new Blob([JSON.stringify(d, null, 2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`NAI_LAB_FULL_BACKUP.json`; a.click(); }
function exportSingle(type) { let d = {}; if(type==='artists') d={artists}; else if(type==='prompts') d={prompts,promptCategories}; else if(type==='styles') d={styles}; else if(type==='researches') d={researches,researchCategories}; const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`NAI_${type.toUpperCase()}.json`; a.click(); }
function importSingle(type) {
  const input=document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange=e=>{ const reader=new FileReader(); reader.onload=async ev=>{ try{ const d=JSON.parse(ev.target.result); const rawData = d.data || d[type]; if(!rawData) return alert('데이터 형식이 다릅니다.'); rawData.forEach(x=>{if(![...artists,...styles,...prompts,...researches].find(y=>y.id===x.id)){ if(type==='artists') artists.push(x); else if(type==='styles') styles.push(x); else if(type==='prompts') prompts.push(x); else researches.push(x); }}); await syncAll(); location.reload(); }catch(e){alert('파일 오류');}}; reader.readAsText(e.target.files[0]); }; input.click();
}
</script>
