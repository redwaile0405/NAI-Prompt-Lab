<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NAI Prompt Lab (Original UI Preserved)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>
    if (localStorage.getItem('dark-mode') === 'enabled') {
      document.documentElement.classList.add('dark');
    }
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    body { font-family: system-ui, sans-serif; transition: background-color 0.3s; }
    .tab-active { border-bottom: 4px solid #3b82f6; color: #1d4ed8; font-weight: 700; }
    .dark .tab-active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .img-container { position: relative; width: 100%; padding-top: 150%; overflow: hidden; border-radius: 12px; background: #f1f5f9; }
    .dark .img-container { background: #1e293b; }
    .img-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .card:hover { transform: translateY(-2px); transition: transform 0.2s; }
    .header-btn { padding: 0.6rem 1rem; border-radius: 0.75rem; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 0.4rem; color: white !important; }
    .dark .bg-white { background-color: #1e293b !important; color: #f1f5f9; }
    .dark .bg-slate-50 { background-color: #0f172a !important; }
    .dark .border { border-color: #334155 !important; }
    .dark input, .dark textarea, .dark select { background-color: #334155 !important; color: white !important; border-color: #475569 !important; }
    .tag-chip { cursor: pointer; transition: all 0.15s; border: 1px solid #e2e8f0; }
    .tag-chip.active { background-color: #3b82f6 !important; color: white !important; border-color: #2563eb; }
    .settings-sub-tab.active { background-color: #3b82f6; color: white; }
    .cat-badge { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; background: #e2e8f0; color: #475569; }
    .dark .cat-badge { background: #334155; color: #cbd5e1; }
    .file-input-label { cursor: pointer; display: block; background: #f8fafc; border: 2px dashed #e2e8f0; padding: 12px; border-radius: 12px; text-align: center; font-size: 11px; font-weight: bold; color: #64748b; }
    .dark .file-input-label { background: #1e293b; border-color: #334155; color: #94a3b8; }
    .slider-label { display: flex; justify-content: space-between; font-size: 10px; font-weight: 800; color: #94a3b8; margin-top: 4px; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .move-btn { opacity: 0; transition: opacity 0.2s; }
    .group:hover .move-btn, .card:hover .move-btn { opacity: 1; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen flex flex-col text-slate-900 dark:text-slate-100 font-sans">

  <aside class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col">

      <div class="text-left">

        <i class="fa-solid fa-gear"></i>

      <button onclick="switchTab(2)" id="tab2" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-3"><i class="fa-solid fa-tags"></i> 프롬프트 목록</button>
      <button onclick="switchTab(3)" id="tab3" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-3"><i class="fa-solid fa-flask-vial"></i> 연구 정리</button>

          <div id="bulk-action-area" class="hidden">

        <textarea id="positive" class="w-full h-64 border rounded-lg p-3 font-mono text-xs leading-relaxed" placeholder="Positive Prompt..."></textarea>

            <div><div class="flex justify-between items-center mb-1"><label class="font-black text-xs text-blue-500">COLOR</label><span id="vis_color" class="font-bold text-xs"></span></div><input id="a_color" type="range" min="1" max="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600" oninput="updateVisual()"><div class="slider-label"><span>PALE</span><span>VIVID</span></div></div>

<script>
// --- 기존 분류 데이터 보존 (사용자 요청에 따라 변경 금지) ---
const DB_NAME = "NAIPromptLabDB_V16";
const STORE_NAME = "labData";
let db, artists = [], styles = [], prompts = [], researches = [];

let artistCommonTags = ["실사", "반실사", "애니", "화려한", "깔끔한", "선명한"];
let promptCategories = [
    { name: "인물", subs: ["인원", "종족", "특징", "직업"] },
    { name: "외모", subs: ["얼굴", "눈", "입", "귀", "머리카락/색", "머리카락/모양"] },
    { name: "체형", subs: ["몸", "가슴", "팔", "손", "다리", "발", "날개", "꼬리", "기타 부위", "NSFW"] },
    { name: "의상", subs: ["의상", "상의", "하의", "속옷", "신발"] },
    { name: "장신구", subs: ["머리 장식", "얼굴 장식", "귀 장식", "목 장식", "손 장식", "기타", "NSFW"] },
    { name: "동작/몸", subs: ["몸", "얼굴", "머리", "목", "눈", "입", "귀", "코", "가슴", "엉덩이", "팔", "손", "다리", "발", "NSFW"] },
    { name: "동작/상호작용", subs: ["의상", "물건", "배경", "행위", "NSFW"] },
    { name: "테마", subs: ["기본"] },
    { name: "구도", subs: ["기본"] },
    { name: "효과", subs: ["기본"] }
];
let researchCategories = ["기본", "포즈", "색감", "소재"];

let currentTab = 0, currentCategoryFilter = 'all', currentSubFilter = 'all', editId = null, builderVisible = false;

// DB & Sync
async function initDB() { return new Promise((resolve) => { const request = indexedDB.open(DB_NAME, 1); request.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME); request.onsuccess = e => { db = e.target.result; resolve(); }; }); }
async function saveToDB(key, data) { const tx = db.transaction(STORE_NAME, "readwrite"); tx.objectStore(STORE_NAME).put(JSON.parse(JSON.stringify(data)), key); }
async function getFromDB(key) { return new Promise((res) => { const tx = db.transaction(STORE_NAME, "readonly"); const req = tx.objectStore(STORE_NAME).get(key); req.onsuccess = () => res(req.result); req.onerror = () => res(null); }); }

async function syncAll() { 
  await saveToDB('artists', artists); await saveToDB('styles', styles); 
  await saveToDB('prompts', prompts); await saveToDB('researches', researches); 
  localStorage.setItem('artTags', JSON.stringify(artistCommonTags));
  localStorage.setItem('pCats_V2', JSON.stringify(promptCategories)); 
  localStorage.setItem('researchCats', JSON.stringify(researchCategories)); 
}

window.addEventListener('load', async () => { 
  await initDB(); 
  artists = await getFromDB('artists') || []; 
  styles = await getFromDB('styles') || []; 
  prompts = await getFromDB('prompts') || []; 
  researches = await getFromDB('researches') || []; 
  
  const savedArtTags = localStorage.getItem('artTags');
  if(savedArtTags) artistCommonTags = JSON.parse(savedArtTags);
  const savedPCats = localStorage.getItem('pCats_V2');
  if(savedPCats) promptCategories = JSON.parse(savedPCats);
  const savedRCats = localStorage.getItem('researchCats');
  if(savedRCats) researchCategories = JSON.parse(savedRCats);

  renderList(); 
});

function getIndicator(val, type='bar') {
  val = parseInt(val);
  if(type==='star') return '★'.repeat(val) + '☆'.repeat(5-val);
  return '▮'.repeat(val) + '▯'.repeat(5-val);
}

function updateVisual() {
  document.getElementById('vis_line').textContent = getIndicator(document.getElementById('a_line').value);
  document.getElementById('vis_color').textContent = getIndicator(document.getElementById('a_color').value);
  document.getElementById('vis_stab').textContent = getIndicator(document.getElementById('a_stab').value, 'star');
  document.getElementById('vis_cons').textContent = getIndicator(document.getElementById('a_cons').value, 'star');
}

function handleImgUpload(event, targetId) {
  const file = event.target.files[0]; if (!file) return;
  const label = event.target.previousElementSibling; label.textContent = "Loading...";
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById(targetId).value = e.target.result;
    label.textContent = "Done: " + file.name.substring(0, 8);
    label.classList.add('!border-blue-500', '!text-blue-500');
  };
  reader.readAsDataURL(file);
}

function switchTab(tab) { 
  currentTab = tab; currentCategoryFilter = 'all'; currentSubFilter = 'all';
  document.querySelectorAll('[id^="tab"]').forEach(el => el.classList.remove('tab-active')); 
  if(document.getElementById('tab' + tab)) document.getElementById('tab' + tab).classList.add('tab-active');
  document.getElementById('tabTitle').textContent = ["작가 정리", "그림체 정리", "프롬프트 목록", "연구 정리", "아티스트 믹서", "시스템 설정"][tab];
  document.getElementById('mainHeader').style.display = (tab === 5) ? 'none' : 'flex';
  
  // 프롬프트 일괄 삭제 버튼 제어
  document.getElementById('bulk-action-area').style.display = (tab === 2) ? 'block' : 'none';

  renderList(); 
}

// --- [기능 추가] 프롬프트 일괄 삭제 로직 ---
function bulkDeletePrompts() {
    if(currentTab !== 2) return;
    const catName = currentSubFilter !== 'all' ? currentSubFilter : (currentCategoryFilter !== 'all' ? currentCategoryFilter : '전체');
    if(!confirm(`[${catName}] 소속의 모든 프롬프트를 일괄 삭제하시겠습니까?`)) return;

    prompts = prompts.filter(p => {
        const matchMain = currentCategoryFilter === 'all' || p.mainCat === currentCategoryFilter;
        const matchSub = currentSubFilter === 'all' || p.subCat === currentSubFilter;
        return !(matchMain && matchSub);
    });
    syncAll();
    renderList();
}

function renderSideCategories() {
  const sideList = document.getElementById('side-category-list');
  const area = document.getElementById('side-category-area');
  const title = document.getElementById('side-filter-title');
  sideList.innerHTML = '';
  let cats = [];

  if (currentTab === 0) { title.textContent = "작가 속성 필터"; cats = artistCommonTags; }
  else if (currentTab === 2) { title.textContent = "프롬프트 분류"; cats = promptCategories.map(c => c.name); }
  else if (currentTab === 3) { title.textContent = "연구 분류"; cats = researchCategories; }
  else { area.style.display = 'none'; return; }

  area.style.display = 'block';
  const createBtn = (label, value, isSub = false) => {
    const btn = document.createElement('button');
    btn.className = `w-full text-left px-4 py-2 rounded-xl text-[11px] font-bold transition-all ${isSub ? 'pl-8' : ''} ${((isSub ? currentSubFilter : currentCategoryFilter) === value) ? 'bg-blue-600 text-white' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'}`;
    btn.textContent = label;
    btn.onclick = () => { 
        if(isSub) currentSubFilter = value;
        else { currentCategoryFilter = value; currentSubFilter = 'all'; }
        renderList(); 
    };
    sideList.appendChild(btn);
  };
  
  createBtn('전체보기', 'all');
  if (currentTab === 2 && currentCategoryFilter !== 'all') {
      const parent = promptCategories.find(c => c.name === currentCategoryFilter);
      if(parent) {
          createBtn(`← ${parent.name} (전체)`, parent.name);
          parent.subs.forEach(s => createBtn('• ' + s, s, true));
      }
  } else {
      cats.forEach(c => createBtn(c, c));
  }
}

function addItem() {
    editId = null;
    if(currentTab === 0) {
        document.getElementById('modalArtist').classList.remove('hidden');
        document.getElementById('a_name').value = ''; document.getElementById('a_danbooru').value = '';
        document.getElementById('a_tags').value = ''; document.getElementById('a_notes').value = '';
        ['a_img1','a_img2','a_img3'].forEach(id => document.getElementById(id).value = '');
        ['a_line','a_color','a_stab','a_cons'].forEach(id => document.getElementById(id).value = 3);
        renderArtistTagPool(); updateVisual();
    } else if(currentTab === 1) {
        document.getElementById('modalStyle').classList.remove('hidden');
        document.getElementById('s_title').value = ''; document.getElementById('s_pos').value = '';
        ['s_img1','s_img2','s_img3'].forEach(id => document.getElementById(id).value = '');
    } else if(currentTab === 2) {
        document.getElementById('modalPrompt').classList.remove('hidden');
        document.getElementById('p_word').value = ''; document.getElementById('p_desc').value = '';
        document.getElementById('p_image').value = '';
        renderPromptCatSelects();
    } else if(currentTab === 3) {
        document.getElementById('modalResearch').classList.remove('hidden');
        document.getElementById('r_title').value = ''; document.getElementById('r_prompt').value = '';
        document.getElementById('r_desc').value = ''; document.getElementById('r_image').value = '';
        const catS = document.getElementById('r_category'); catS.innerHTML = researchCategories.map(c => `<option value="${c}">${c}</option>`).join('');

}

function renderArtistTagPool() {
    const pool = document.getElementById('a_tag_pool');
    pool.innerHTML = artistCommonTags.map(t => `<span onclick="toggleArtistTag('${t}')" class="tag-chip px-3 py-1 rounded-lg text-xs font-bold bg-white dark:bg-slate-700">${t}</span>`).join('');
}

function toggleArtistTag(t) {
    const input = document.getElementById('a_tags');
    let tags = input.value.split(',').map(x => x.trim()).filter(x => x);
    if(tags.includes(t)) tags = tags.filter(x => x !== t);
    else tags.push(t);
    input.value = tags.join(', ');
}

function renderPromptCatSelects() {
    const main = document.getElementById('p_main_cat');
    main.innerHTML = promptCategories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    updateSubCatSelect();
}

function updateSubCatSelect() {
    const mainVal = document.getElementById('p_main_cat').value;
    const sub = document.getElementById('p_sub_cat');
    const parent = promptCategories.find(c => c.name === mainVal);
    sub.innerHTML = parent.subs.map(s => `<option value="${s}">${s}</option>`).join('');
}

    const obj = {
        id: editId || Date.now().toString(),
        name: document.getElementById('a_name').value,
        danbooru: document.getElementById('a_danbooru').value,
        tags: document.getElementById('a_tags').value,
        line: document.getElementById('a_line').value,
        color: document.getElementById('a_color').value,
        stab: document.getElementById('a_stab').value,
        cons: document.getElementById('a_cons').value,
        imgs: [document.getElementById('a_img1').value, document.getElementById('a_img2').value, document.getElementById('a_img3').value],

    if(editId) artists = artists.map(a => a.id === editId ? obj : a);

    syncAll(); closeModal(); renderList();
}

function edit(type, id) {
    editId = id;
    if(type === 'artist') {
        const a = artists.find(x => x.id === id);
        document.getElementById('modalArtist').classList.remove('hidden');
        document.getElementById('a_name').value = a.name; document.getElementById('a_danbooru').value = a.danbooru;
        document.getElementById('a_tags').value = a.tags; document.getElementById('a_notes').value = a.notes;
        document.getElementById('a_img1').value = a.imgs[0]; document.getElementById('a_img2').value = a.imgs[1]; document.getElementById('a_img3').value = a.imgs[2];
        document.getElementById('a_line').value = a.line; document.getElementById('a_color').value = a.color;
        document.getElementById('a_stab').value = a.stab; document.getElementById('a_cons').value = a.cons;
        renderArtistTagPool(); updateVisual();
    } else if(type === 'style') {
        const s = styles.find(x => x.id === id);
        document.getElementById('modalStyle').classList.remove('hidden');
        document.getElementById('s_title').value = s.title; document.getElementById('s_pos').value = s.pos;
        document.getElementById('s_img1').value = s.imgs[0]; document.getElementById('s_img2').value = s.imgs[1]; document.getElementById('s_img3').value = s.imgs[2];
    } else if(type === 'prompt') {
        const p = prompts.find(x => x.id === id);
        document.getElementById('modalPrompt').classList.remove('hidden');
        document.getElementById('p_word').value = p.word; document.getElementById('p_desc').value = p.desc;
        renderPromptCatSelects();
        document.getElementById('p_main_cat').value = p.mainCat; updateSubCatSelect();
        document.getElementById('p_sub_cat').value = p.subCat;
        document.getElementById('p_image').value = p.image;
    } else if(type === 'research') {
        const r = researches.find(x => x.id === id);
        document.getElementById('modalResearch').classList.remove('hidden');
        const catS = document.getElementById('r_category');
        catS.innerHTML = researchCategories.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('r_title').value = r.title; document.getElementById('r_category').value = r.category;
        document.getElementById('r_prompt').value = r.prompt; document.getElementById('r_desc').value = r.desc;
        document.getElementById('r_image').value = r.image;
    }
}

function del(type, id) {
    if(!confirm('삭제하시겠습니까?')) return;
    if(type === 'artist') artists = artists.filter(x => x.id !== id);
    else if(type === 'style') styles = styles.filter(x => x.id !== id);
    else if(type === 'prompt') prompts = prompts.filter(x => x.id !== id);
    else if(type === 'research') researches = researches.filter(x => x.id !== id);
    syncAll(); renderList();
}

function addToBuilder(word) { const pos = document.getElementById('positive'); pos.value = pos.value ? pos.value + ", " + word : word; }
function toggleBuilder() { document.getElementById('builder-panel').classList.toggle('hidden'); }
function copyPositive() { navigator.clipboard.writeText(document.getElementById('positive').value).then(() => alert('복사완료')); }
function clearBuilder() { document.getElementById('positive').value = ''; document.getElementById('negative').value = ''; }

function generateMix() {
    const tag = document.getElementById('mix_tag').value;
    const filtered = artists.filter(a => tag === 'all' || (a.tags && a.tags.includes(tag)));
    if(filtered.length < 3) return alert('작가가 3명 이상 필요합니다.');
    const min = parseFloat(document.getElementById('mix_min').value);
    const max = parseFloat(document.getElementById('mix_max').value);
    const res = document.getElementById('mix_results'); res.innerHTML = '';
    for(let i=0; i<3; i++) {
        let mixArr = [];
        let tempArr = [...filtered].sort(() => 0.5 - Math.random());
        for(let j=0; j<3; j++) {
            const w = (Math.random() * (max - min) + min).toFixed(2);
            mixArr.push(`{${tempArr[j].name}:${w}}`);
        }
        const str = mixArr.join(', ');
        const div = document.createElement('div');
        div.className = 'bg-white dark:bg-slate-800 p-6 rounded-2xl border dark:border-slate-700 cursor-pointer hover:border-fuchsia-500 shadow-sm transition-all';
        div.innerHTML = `<div class="font-mono text-xs break-all leading-relaxed">${str}</div><div class="mt-2 text-[8px] text-slate-400 font-bold uppercase">Click to Copy</div>`;
        div.onclick = () => { navigator.clipboard.writeText(str); alert('복사되었습니다.'); };
        res.appendChild(div);
    }
}

                    <input type="file" id="import-file" class="hidden" onchange="handleImport(event)">
                </label>
                <p class="text-[9px] text-slate-400">* 파일 선택 후 추가/교체를 선택할 수 있습니다.</p>
              </div>
            </div>
          </section>
        </div>
      </div>
    `;
}

function setDarkMode(isDark) {
  if (isDark) {
    document.documentElement.classList.add('dark');
    localStorage.setItem('dark-mode', 'enabled');
  } else {
    document.documentElement.classList.remove('dark');
    localStorage.setItem('dark-mode', 'disabled');
  }
}

// 내보내기 로직
function handleExport() {
    const target = document.getElementById('export_target').value;
    let exportData = { artists:[], styles:[], prompts:[], researches:[] };
    let fileName = `NAI_Lab_Backup_${new Date().toISOString().slice(0,10)}`;

    if (target === 'all') {
        exportData = { artists, styles, prompts, researches, artistCommonTags, promptCategories, researchCategories };
    } else if (target === 'prompts_all') {
        exportData.prompts = prompts;
        fileName = "NAI_Prompts_All";
    } else if (target.startsWith('p_')) {
        const catName = target.replace('p_', '');
        exportData.prompts = prompts.filter(p => p.mainCat === catName);
        fileName = `NAI_Prompts_${catName}`;
    }

    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName + ".json";
    a.click();
}

// 가져오기 로직 (추가/교체 선택 기능 포함)
function handleImport(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const imported = JSON.parse(e.target.result);
            const mode = confirm("기존 데이터에 [합치기]를 하시겠습니까?\n\n(확인: 합치기 / 취소: 기존 데이터 삭제 후 교체)") ? 'append' : 'replace';
            
            if (mode === 'append') {
                if(imported.artists) artists = [...artists, ...imported.artists];
                if(imported.styles) styles = [...styles, ...imported.styles];
                if(imported.prompts) prompts = [...prompts, ...imported.prompts];
                if(imported.researches) researches = [...researches, ...imported.researches];
            } else {
                artists = imported.artists || [];
                styles = imported.styles || [];
                prompts = imported.prompts || [];
                researches = imported.researches || [];
            }
            
            syncAll();
            alert('데이터를 성공적으로 불러왔습니다.');
            location.reload();
        } catch (err) {
            alert('유효한 JSON 형식이 아닙니다.');
        }
    };
    reader.readAsText(file);
}
</script>
